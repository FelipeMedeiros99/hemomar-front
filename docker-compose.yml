version: "3.8"

services:
  front:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hemomar_front
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
    tty: true
    restart: unless-stopped
